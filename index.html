<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yannis Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
    }

    #app {
      width: 100vw;
      height: 100vh;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #ui {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #crossfade {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      transition: opacity 2s ease;
    }

    #end-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 3s ease;
      font-family: 'Georgia', serif;
      font-size: 1.5rem;
      color: #fff;
      letter-spacing: 0.1em;
      text-align: center;
    }

    #controls-hint {
      position: absolute;
      bottom: 2rem;
      width: 100%;
      text-align: center;
      font-family: monospace;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.15em;
      transition: opacity 3s ease;
    }

    /* GOAL!! banner */
    #goal-banner {
      position: absolute;
      top: 6%;
      width: 100%;
      text-align: center;
      font-family: 'Boogaloo', 'Impact', cursive;
      font-size: 6rem;
      font-weight: 900;
      color: #fff;
      text-shadow:
        0 0 20px #ffcc00,
        0 0 40px #ff8800,
        4px 4px 0 #cc3300,
        8px 8px 0 #880000;
      letter-spacing: 0.05em;
      opacity: 0;
      pointer-events: none;
      transform: scale(0.3) rotate(-5deg);
      transition: none;
    }

    #goal-banner.show {
      animation: goalBounce 0.5s cubic-bezier(0.17, 0.67, 0.5, 1.5) forwards;
    }

    #goal-banner.hide {
      animation: goalFade 0.6s ease forwards;
    }

    @keyframes goalBounce {
      0% {
        opacity: 0;
        transform: scale(0.3) rotate(-5deg);
      }

      60% {
        opacity: 1;
        transform: scale(1.15) rotate(3deg);
      }

      80% {
        transform: scale(0.95) rotate(-1deg);
      }

      100% {
        opacity: 1;
        transform: scale(1.0) rotate(0deg);
      }
    }

    @keyframes goalFade {
      from {
        opacity: 1;
        transform: scale(1.0);
      }

      to {
        opacity: 0;
        transform: scale(1.3);
      }
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <div id="ui">
    <div id="crossfade"></div>
    <div id="end-text">"This room was built by your behavior."</div>
    <div id="goal-banner">⚽ GOAL !! ⚽</div>
    <div id="controls-hint">ARROW KEYS — MOVE &nbsp;|&nbsp; SPACE — JUMP &nbsp;|&nbsp; E — SPAWN ECHO</div>
  </div>
  <script type="module" src="/src/core/main.js"></script>
</body>

</html>
